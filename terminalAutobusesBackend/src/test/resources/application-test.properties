# ─────────────────────────────────────────────────────────────
# Configuración de pruebas con H2 en memoria
# ─────────────────────────────────────────────────────────────

# H2 in-memory database (evita depender de MySQL en tests)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Sobrescribe el dialect MySQL del application.properties
# H2 usa TIMESTAMP en vez de DATETIME (incompatible con MySQL)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# JWT secret para pruebas (HS256 válido con 256 bits)
jwt.secret=test-secret-key-for-testing-purposes-only-2026

# Deshabilitar devtools en pruebas
spring.devtools.restart.enabled=false
