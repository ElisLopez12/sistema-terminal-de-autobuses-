# ─────────────────────────────────────────────────────────────
# Configuración para el perfil 'dev' — datos de prueba poblados
# ─────────────────────────────────────────────────────────────

# Diferir la inicialización del datasource para que Hibernate
# ejecute el DDL (schema update) ANTES de que Spring Boot
# ejecute data-dev.sql
spring.jpa.defer-datasource-initialization=true

# Cargar explícitamente data-dev.sql (no data.sql)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-dev.sql

# Forzar schema-locations vacío para evitar schema.sql si existe
spring.sql.init.schema-locations=
