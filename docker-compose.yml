services:
  mysql:
    image: mysql:8.0
    container_name: terminal-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: elis12
      MYSQL_DATABASE: terminal
      TZ: America/Caracas
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pelis12"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./terminalAutobusesBackend
    container_name: terminal-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/terminal?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Caracas&connectionCollation=utf8mb4_unicode_ci&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: elis12
      TZ: America/Caracas
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./terminalAutobusesFrontend
    container_name: terminal-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
